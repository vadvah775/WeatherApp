<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{images/weather-app.png}" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <div th:if="${username == null}">
                <a th:href="@{/sign-in}" class="btn btn-outline-primary me-2">Sign In</a>
                <a th:href="@{/sign-up}" class="btn btn-outline-secondary">Sign Up</a>
            </div>
            <div th:if="${username != null}">
                <span class="navbar-text me-3" th:text="'Hello, ' + ${username}"></span>
                <form method="post" th:action="@{/logout}" style="display: inline;">
                    <button type="submit" class="btn btn-outline-danger">Sign out</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">
        <div class="d-flex my-4">
            <form th:action="@{/search}" method="get" class="w-100 d-flex">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control" type="text" name="name" th:value="${query}" placeholder="Enter location" required>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button" onclick="this.previousElementSibling.value=''">&times;</button>
                </div>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>

        <div>
            <h2>Locations:</h2>
            <div class="row">
                <div th:each="loc : ${results}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${loc.name} + ', ' + ${loc.country}" ></h5>
                            <p class="card-text mb-1">Latitude: <span th:text="${loc.lat}"></span></p>
                            <p class="card-text mb-1">Longitude: <span th:text="${loc.lon}"></span></p>
                            <p class="card-text mb-3" th:if="${loc.state != null}" th:text="'State: ' + ${loc.state}"></p>
                            <div class="mt-auto">
                                <form method="post" th:action="@{/locations/add}">
                                    <input  type="hidden" name="name" th:value="${loc.name}">
                                    <input type="hidden" name="lat" th:value="${loc.lat}">
                                    <input type="hidden" name="lon" th:value="${loc.lon}">
                                    <button type="submit" class="btn btn-primary w-100">Add</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
